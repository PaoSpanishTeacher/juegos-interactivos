<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completa la Oración - Lugares de la Ciudad</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --bg: #f0f9ff;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsPSIlMjNlNWU3ZWIiIGZpbGwtb3BhY2l0eT0iMC40Ij48cGF0aCBkPSJNMjAgMTBMMTAgMjBoMjBMMjAgMTB6bTAgMjBMMTAgMjBoMjBMMjAgMzB6Ii8+PC9nPjwvc3ZnPg==');
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .game-header {
            width: 100%;
            background: white;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--primary); margin: 0; font-size: 2rem; }

        .progress-container {
            width: 90%;
            max-width: 600px;
            background: #e2e8f0;
            height: 12px;
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s ease;
        }

        .counter { font-weight: bold; font-size: 1.2rem; color: #64748b; }

        .game-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 700px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .sentence {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 40px;
            line-height: 1.5;
            color: #1e293b;
        }

        .blank {
            display: inline-block;
            min-width: 150px;
            border-bottom: 4px dashed var(--primary);
            color: var(--success);
            padding: 0 10px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: #475569;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateY(-3px);
        }

        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--error); color: white; border-color: var(--error); }

        /* Profesor y Feedback */
        #feedback-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 100;
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #feedback-overlay.active { transform: translate(-50%, -50%) scale(1); }

        .profesor { font-size: 6rem; display: block; margin-bottom: 10px; }
        .feedback-msg { font-size: 2.5rem; font-weight: 900; color: var(--success); }

        #error-toast {
            position: fixed;
            bottom: 30px;
            background: var(--error);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            animation: shake 0.5s;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Pantalla Final */
        #victory-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        .final-msg { font-size: 3rem; color: var(--primary); font-weight: 900; margin: 20px; max-width: 80%; }

        .btn-retry {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 0 #1e40af;
            transition: all 0.1s;
        }

        .btn-retry:active { transform: translateY(4px); box-shadow: 0 4px 0 #1e40af; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .sentence { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header class="game-header">
        <h1>Completa la Oración - Lugares de la Ciudad</h1>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="counter" id="counter">1 / 10</div>
    </header>

    <div class="game-card" id="game-card">
        <div class="sentence" id="sentence-container">
            Cargando oración...
        </div>
        <div class="options-grid" id="options-container">
            <!-- Opciones generadas por JS -->
        </div>
    </div>

    <div id="feedback-overlay">
        <span class="profesor">👨‍🏫</span>
        <span class="feedback-msg">¡Excelente!</span>
    </div>

    <div id="error-toast">Intenta otra vez</div>

    <div id="victory-screen">
        <span class="profesor" style="font-size: 8rem;">👨‍🏫</span>
        <h2 class="final-msg">¡Felicidades! Sigue aprendiendo más español.</h2>
        <button class="btn-retry" onclick="resetGame()">Jugar otra vez</button>
    </div>

    <script>
        const QUESTIONS = [
            { s: "Vamos _ para ver una película.", a: "al cine", o: ["al cine", "al hospital", "al supermercado", "a la policía"] },
            { s: "Mi mamá compra medicina _.", a: "en la farmacia", o: ["en la farmacia", "en el parque", "en el cine", "en la biblioteca"] },
            { s: "Almorzamos una pizza deliciosa _.", a: "en el restaurante", o: ["en el hospital", "en el restaurante", "en la escuela", "en la farmacia"] },
            { s: "Los niños corren y juegan _.", a: "en el parque", o: ["en la panadería", "en el banco", "en el parque", "en la farmacia"] },
            { s: "Hacemos la compra de comida _.", a: "en el supermercado", o: ["en el cine", "en la escuela", "en el supermercado", "en el hospital"] },
            { s: "El doctor atiende a los enfermos _.", a: "en el hospital", o: ["en el hospital", "en la biblioteca", "en el restaurante", "en el cine"] },
            { s: "Los estudiantes aprenden matemáticas _.", a: "en la escuela", o: ["en el parque", "en la escuela", "en la panadería", "en el hospital"] },
            { s: "Buscamos libros interesantes _.", a: "en la biblioteca", o: ["en la biblioteca", "en el supermercado", "en la estación", "en el restaurante"] },
            { s: "Compramos pan caliente cada mañana _.", a: "en la panadería", o: ["en el cine", "en la panadería", "en la escuela", "en la farmacia"] },
            { s: "El oficial trabaja para cuidarnos _.", a: "en la estación de policía", o: ["en el parque", "en la estación de policía", "en el hospital", "en la biblioteca"] }
        ];

        let currentIdx = 0;
        let isAnswering = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSfx(freq, type = 'sine', duration = 0.3) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function loadQuestion() {
            const q = QUESTIONS[currentIdx];
            const sentenceDiv = document.getElementById('sentence-container');
            const optionsDiv = document.getElementById('options-container');
            
            // Actualizar barra y contador
            document.getElementById('progress-bar').style.width = `${(currentIdx / QUESTIONS.length) * 100}%`;
            document.getElementById('counter').innerText = `${currentIdx + 1} / ${QUESTIONS.length}`;

            // Renderizar oración con espacio en blanco
            sentenceDiv.innerHTML = q.s.replace('_', '<span class="blank" id="blank-space">...</span>');
            
            // Renderizar opciones
            optionsDiv.innerHTML = '';
            q.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsDiv.appendChild(btn);
            });
            
            isAnswering = false;
        }

        function checkAnswer(selected, btn) {
            if (isAnswering) return;
            const q = QUESTIONS[currentIdx];

            if (selected === q.a) {
                isAnswering = true;
                btn.classList.add('correct');
                document.getElementById('blank-space').innerText = selected;
                playSfx(523, 'sine', 0.5); // C5 - Acierto
                
                showFeedback();
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

                setTimeout(() => {
                    currentIdx++;
                    if (currentIdx < QUESTIONS.length) {
                        loadQuestion();
                    } else {
                        showVictory();
                    }
                }, 2000);
            } else {
                btn.classList.add('wrong');
                playSfx(150, 'square', 0.3); // Error
                showError();
                setTimeout(() => btn.classList.remove('wrong'), 1000);
            }
        }

        function showFeedback() {
            const fb = document.getElementById('feedback-overlay');
            fb.classList.add('active');
            setTimeout(() => fb.classList.remove('active'), 1500);
        }

        function showError() {
            const toast = document.getElementById('error-toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 1500);
        }

        function showVictory() {
            document.getElementById('progress-bar').style.width = `100%`;
            const screen = document.getElementById('victory-screen');
            screen.style.display = 'flex';
            
            // Música de celebración
            const notes = [523, 659, 783, 1046];
            notes.forEach((n, i) => setTimeout(() => playSfx(n, 'sine', 0.6), i * 150));

            // Confeti continuo
            const end = Date.now() + 5000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function resetGame() {
            currentIdx = 0;
            document.getElementById('victory-screen').style.display = 'none';
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
