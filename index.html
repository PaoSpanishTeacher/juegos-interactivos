<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>

        body { font-family: 'Poppins', sans-serif; background: var(--fondo); color: #2B2A27; }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn { display: inline-block; background: var(--verde); color: #fff; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: 600; margin-top: 15px; }
        .btn:hover { background: var(--fucsia); }
    </style>
</head>

    <div class="container">

            <div class="card"><span>📝</span><h3>Subjuntivo 1</h3><a href="subjuntivo-completa-estructura.B2.html" class="btn">Jugar</a></div>
            <div class="card"><span>✨</span><h3>Subjuntivo 2</h3><a href="subjuntivo-deseos-necesidades-B2.html" class="btn">Jugar</a></div>

    </div>

</html>
