<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - Las Partes de la Casa</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #ff6b6b;
            --accent: #feca57;
            --success: #1dd1a1;
            --bg: #f0f4f8;
            --text: #2d3436;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            background: white;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 2.2rem; }
        .decor-top { font-size: 1.5rem; margin-top: 5px; }

        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
            max-width: 1100px;
            width: 95%;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Cuadrícula de la Sopa */
        #wordsearch-grid {
            display: grid;
            grid-template-columns: repeat(12, 40px);
            grid-template-rows: repeat(12, 40px);
            gap: 5px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            user-select: none;
            touch-action: none;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
            color: #34495e;
            text-transform: uppercase;
        }

        .cell.selected {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
            border-color: transparent;
        }

        .cell.found {
            background: var(--success);
            color: white;
            border-color: transparent;
        }

        /* Lista Lateral */
        .sidebar {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            min-width: 250px;
            flex: 1;
        }

        .sidebar h2 {
            font-size: 1.3rem;
            color: var(--primary);
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .word-list-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            text-transform: lowercase;
            background: #fdfdfd;
            border: 1px solid #eee;
        }

        .word-list-item.found {
            background: #e1f7f0;
            color: #10ac84;
            border-color: var(--success);
        }

        .check-icon { display: none; color: var(--success); }
        .found .check-icon { display: inline; }

        /* Mensaje de Excelente */
        #popup-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: var(--success);
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popup-msg.active { transform: translate(-50%, -50%) scale(1); }

        /* Pantalla Final */
        #final-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }

        .prof-anim { font-size: 8rem; margin-bottom: 20px; }
        
        .victory-text {
            font-size: 3rem;
            color: var(--primary);
            margin: 20px 0;
            line-height: 1.2;
        }

        .btn-restart {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #2980b9;
            transition: transform 0.2s;
        }

        .btn-restart:hover { transform: scale(1.05); }

        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 3rem;
            animation: rise 5s linear forwards;
        }

        @keyframes rise {
            to { transform: translateY(-120vh) rotate(20deg); }
        }

        @media (max-width: 600px) {
            #wordsearch-grid {
                grid-template-columns: repeat(12, 28px);
                grid-template-rows: repeat(12, 28px);
                gap: 2px;
                padding: 5px;
            }
            .cell { width: 28px; height: 28px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sopa de Letras - Las Partes de la Casa 🏠</h1>
        <div class="decor-top">🏠 🛋️ 🛏️ 🚿 🍽️</div>
    </header>

    <div class="game-container">
        <div id="wordsearch-grid"></div>

        <aside class="sidebar">
            <h2>Busca estas palabras:</h2>
            <div id="list-container"></div>
        </aside>
    </div>

    <div id="popup-msg">¡Excelente!</div>

    <div id="final-overlay">
        <div id="balloon-box"></div>
        <div class="prof-anim">👨‍🏫</div>
        <h2 class="victory-text">Te felicito, sigue aprendiendo español.</h2>
        <button class="btn-restart" onclick="location.reload()">Jugar otra vez</button>
    </div>

    <script>
        // Palabras con ortografía estricta (incluye tildes y ñ)
        const PALABRAS = ["cocina", "sala", "baño", "dormitorio", "comedor", "garaje", "patio", "balcón", "escalera", "techo"];
        const GRID_SIZE = 12;
        let grid = [];
        let foundWords = [];
        let selecting = false;
        let selectedCells = [];

        // Audio System (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'hit') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                const notes = [523, 659, 783, 1046];
                notes.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, now + (i * 0.15));
                    g.gain.setValueAtTime(0.1, now + (i * 0.15));
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.5 + (i * 0.15));
                    o.start(now + (i * 0.15)); o.stop(now + 0.6 + (i * 0.15));
                });
            }
        }

        function initGame() {
            createEmptyGrid();
            fillWords();
            fillRandomLetters();
            renderGrid();
            renderList();
        }

        function createEmptyGrid() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(''));
        }

        function fillWords() {
            PALABRAS.forEach(word => {
                let placed = false;
                // Usamos el texto tal cual (con tildes y ñ) en mayúsculas
                const upperWord = word.toUpperCase();
                
                while (!placed) {
                    const direction = Math.floor(Math.random() * 3); // 0: Hor, 1: Ver, 2: Diag
                    const row = Math.floor(Math.random() * GRID_SIZE);
                    const col = Math.floor(Math.random() * GRID_SIZE);

                    if (canPlace(upperWord, row, col, direction)) {
                        for (let i = 0; i < upperWord.length; i++) {
                            const r = row + (direction === 1 || direction === 2 ? i : 0);
                            const c = col + (direction === 0 || direction === 2 ? i : 0);
                            grid[r][c] = upperWord[i];
                        }
                        placed = true;
                    }
                }
            });
        }

        function canPlace(word, row, col, dir) {
            for (let i = 0; i < word.length; i++) {
                const r = row + (dir === 1 || dir === 2 ? i : 0);
                const c = col + (dir === 0 || dir === 2 ? i : 0);
                // Si se sale de la cuadrícula o hay una letra diferente ya puesta
                if (r >= GRID_SIZE || c >= GRID_SIZE || (grid[r][c] !== '' && grid[r][c] !== word[i])) return false;
            }
            return true;
        }

        function fillRandomLetters() {
            // Letras aleatorias incluyendo caracteres especiales para rellenar (opcional, pero las palabras clave ya los tienen)
            const letters = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZÁÉÍÓÚ";
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === '') {
                        grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
                    }
                }
            }
        }

        function renderGrid() {
            const container = document.getElementById('wordsearch-grid');
            container.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = grid[r][c];
                    cell.dataset.r = r;
                    cell.dataset.c = c;

                    cell.addEventListener('mousedown', startSelection);
                    cell.addEventListener('mouseover', updateSelection);
                    cell.addEventListener('touchstart', (e) => { e.preventDefault(); startSelection(e); });
                    cell.addEventListener('touchmove', handleTouchMove);

                    container.appendChild(cell);
                }
            }
            window.addEventListener('mouseup', endSelection);
            window.addEventListener('touchend', endSelection);
        }

        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            PALABRAS.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-list-item';
                div.id = `word-${word}`;
                div.innerHTML = `<span>${word}</span> <span class="check-icon">✔</span>`;
                container.appendChild(div);
            });
        }

        function startSelection(e) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            selecting = true;
            selectedCells = [];
            const cell = e.target.closest('.cell');
            if (cell) toggleCell(cell);
        }

        function updateSelection(e) {
            if (!selecting) return;
            const cell = e.target.closest('.cell');
            if (cell && !selectedCells.includes(cell)) toggleCell(cell);
        }

        function handleTouchMove(e) {
            if (!selecting) return;
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('cell') && !selectedCells.includes(target)) {
                toggleCell(target);
            }
        }

        function toggleCell(cell) {
            cell.classList.add('selected');
            selectedCells.push(cell);
        }

        function endSelection() {
            if (!selecting) return;
            selecting = false;
            
            const selectedWord = selectedCells.map(c => c.textContent).join('');
            const reversedWord = selectedWord.split('').reverse().join('');

            // Validación ESTRICTA: se compara el texto tal cual sin normalizar
            const match = PALABRAS.find(w => {
                const target = w.toUpperCase();
                return (selectedWord === target || reversedWord === target) && !foundWords.includes(w);
            });

            if (match) {
                foundWords.push(match);
                selectedCells.forEach(c => {
                    c.classList.remove('selected');
                    c.classList.add('found');
                });
                markAsFound(match);
                playSfx('hit');
                showExcellent();
                if (foundWords.length === PALABRAS.length) triggerVictory();
            } else {
                selectedCells.forEach(c => c.classList.remove('selected'));
            }
            selectedCells = [];
        }

        function markAsFound(word) {
            const el = document.getElementById(`word-${word}`);
            if (el) el.classList.add('found');
        }

        function showExcellent() {
            const pop = document.getElementById('popup-msg');
            pop.classList.add('active');
            setTimeout(() => pop.classList.remove('active'), 1200);
        }

        function triggerVictory() {
            setTimeout(() => {
                playSfx('win');
                document.getElementById('final-overlay').style.display = 'flex';
                confetti({
                    particleCount: 200,
                    spread: 80,
                    origin: { y: 0.6 }
                });

                const box = document.getElementById('balloon-box');
                for(let i=0; i<15; i++) {
                    setTimeout(() => {
                        const b = document.createElement('div');
                        b.className = 'balloon';
                        b.textContent = ['🎈', '🎊', '✨', '⭐'][Math.floor(Math.random()*4)];
                        b.style.left = Math.random() * 90 + 'vw';
                        box.appendChild(b);
                    }, i * 300);
                }
            }, 1000);
        }

        initGame();
    </script>
</body>
</html>
