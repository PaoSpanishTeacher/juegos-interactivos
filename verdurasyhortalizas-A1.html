<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construye la Palabra - Verduras y Hortalizas</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #f1c40f;
            --accent: #e67e22;
            --danger: #e74c3c;
            --bg: #f9fdf9;
            --text: #2c3e50;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#dcfce7 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            background: white;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h1 { margin: 0; color: #16a085; font-size: 2rem; }
        .decor { font-size: 1.5rem; margin-top: 5px; }

        .game-layout {
            display: flex;
            gap: 20px;
            padding: 20px;
            width: 95%;
            max-width: 1100px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Lista Lateral */
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 250px;
            flex: 1;
        }

        .sidebar h2 { font-size: 1.2rem; color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }

        .word-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .word-item.done {
            background: #d4edda;
            color: #155724;
            transform: translateX(10px);
        }

        .check { display: none; color: var(--primary); }
        .done .check { display: inline; }

        /* Área Principal */
        .main-game {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 320px;
        }

        #construction-zone {
            background: #fff;
            border: 4px dashed #bdc3c7;
            border-radius: 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            position: relative;
            transition: all 0.3s;
        }

        #construction-zone.hover { border-color: var(--primary); background: #f0fff4; }

        #pieces-pool {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Piezas */
        .piece {
            background: var(--accent);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            cursor: grab;
            font-weight: bold;
            font-size: 1.4rem;
            user-select: none;
            box-shadow: 0 5px 0 #d35400;
            transition: transform 0.1s, background 0.3s;
            text-transform: uppercase;
        }

        .piece:active { cursor: grabbing; transform: translateY(2px); }
        .piece.correct { background: var(--primary) !important; box-shadow: 0 5px 0 #27ae60 !important; cursor: default; }

        /* Feedback */
        #msg-pop {
            position: absolute;
            top: -40px;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Profesor Pop-up */
        #prof-panel {
            position: fixed;
            bottom: -400px;
            right: 40px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #prof-panel.show { bottom: 20px; }

        .bubble {
            background: white;
            border: 3px solid var(--primary);
            padding: 15px 25px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: 30px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: var(--primary) transparent;
        }

        /* Pantalla Final */
        #final-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        .btn-play {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 0 #27ae60;
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 3rem;
            animation: rise 5s linear forwards;
        }

        @keyframes rise {
            to { transform: translateY(-120vh) rotate(20deg); }
        }
    </style>
</head>
<body>

<header>
    <h1>Construye la Palabra - Verduras 🥗</h1>
    <div class="decor">🥕 🥦 🍅 🥬 🌽</div>
</header>

<div class="game-layout">
    <aside class="sidebar">
        <h2>Tus Palabras:</h2>
        <div id="words-list-container"></div>
    </aside>

    <main class="main-game">
        <div id="construction-zone">
            <span id="msg-pop">¡Correcto!</span>
            <p id="hint-text" style="color: #95a5a6;">Suelta las sílabas aquí...</p>
        </div>

        <div id="pieces-pool"></div>
    </main>
</div>

<div id="prof-panel">
    <div class="bubble" id="prof-txt">¡Sigue, tú puedes!</div>
    <div style="font-size: 6rem;">👨‍🏫</div>
</div>

<div id="final-screen">
    <div id="balloons-box"></div>
    <div style="font-size: 7rem;">👨‍🏫</div>
    <h2 style="font-size: 2.5rem; color: #16a085;">¡Qué bien!<br>Sigue aprendiendo español.</h2>
    <button class="btn-play" onclick="location.reload()">Jugar otra vez</button>
</div>

<script>
    // Configuración de Palabras y Sílabas
    const PALABRAS_OBJ = [
        { word: 'zanahoria', parts: ['zana', 'ho', 'ria'] },
        { word: 'lechuga', parts: ['le', 'chu', 'ga'] },
        { word: 'tomate', parts: ['to', 'ma', 'te'] },
        { word: 'cebolla', parts: ['ce', 'bo', 'lla'] },
        { word: 'pepino', parts: ['pe', 'pi', 'no'] },
        { word: 'espinaca', parts: ['es', 'pi', 'na', 'ca'] },
        { word: 'brócoli', parts: ['bró', 'co', 'li'] },
        { word: 'ajo', parts: ['a', 'jo'] },
        { word: 'pimiento', parts: ['pi', 'mien', 'to'] },
        { word: 'calabaza', parts: ['ca', 'la', 'ba', 'za'] }
    ];

    const PALABRAS_LISTA = PALABRAS_OBJ.map(p => p.word);
    let completadas = [];
    let halfwayDone = false;

    // Audio Context (Web Audio API para evitar archivos externos)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playNote(freq, type, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    }

    const sfxCorrect = () => playNote(523.25, 'sine', 0.3);
    const sfxMotivate = () => { playNote(392, 'square', 0.2); setTimeout(() => playNote(523, 'square', 0.2), 150); };
    const sfxWin = () => { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playNote(f, 'triangle', 0.6), i * 150)); };

    // Inicialización
    const sidebar = document.getElementById('words-list-container');
    const pool = document.getElementById('pieces-pool');
    const zone = document.getElementById('construction-zone');

    function init() {
        // Crear lista lateral
        PALABRAS_LISTA.forEach(w => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.id = `item-${w}`;
            div.innerHTML = `<span>${w}</span> <span class="check">✔</span>`;
            sidebar.appendChild(div);
        });

        // Crear piezas mezcladas
        let allParts = [];
        PALABRAS_OBJ.forEach(p => allParts.push(...p.parts));
        allParts.sort(() => Math.random() - 0.5);

        allParts.forEach((txt, idx) => {
            const el = document.createElement('div');
            el.className = 'piece';
            el.textContent = txt;
            el.id = `p-${idx}`;
            el.draggable = true;
            
            el.addEventListener('dragstart', (e) => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                e.dataTransfer.setData('text/plain', e.target.id);
            });

            pool.appendChild(el);
        });
    }

    // Drag & Drop
    zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('hover');
    });

    zone.addEventListener('dragleave', () => zone.classList.remove('hover'));

    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('hover');
        const id = e.dataTransfer.getData('text/plain');
        const piece = document.getElementById(id);
        
        if (piece) {
            document.getElementById('hint-text').style.display = 'none';
            zone.appendChild(piece);
            checkConstruction();
        }
    });

    // Devolver al pool
    pool.addEventListener('dragover', (e) => e.preventDefault());
    pool.addEventListener('drop', (e) => {
        e.preventDefault();
        const id = e.dataTransfer.getData('text/plain');
        const piece = document.getElementById(id);
        if (piece && !piece.classList.contains('correct')) {
            pool.appendChild(piece);
            checkConstruction();
            if (zone.querySelectorAll('.piece').length === 0) {
                document.getElementById('hint-text').style.display = 'block';
            }
        }
    });

    function checkConstruction() {
        const piecesInZone = Array.from(zone.querySelectorAll('.piece:not(.correct)'));
        if (piecesInZone.length === 0) return;

        // Validar únicamente por el texto resultante
        const currentText = piecesInZone.map(p => p.textContent.toLowerCase()).join('');
        
        // Normalizar tildes para la comparación (aunque brócoli tiene tilde, se valida exacto)
        if (PALABRAS_LISTA.includes(currentText) && !completadas.includes(currentText)) {
            success(currentText, piecesInZone);
        }
    }

    function success(word, pieces) {
        pieces.forEach(p => {
            p.classList.add('correct');
            p.draggable = false;
        });

        completadas.push(word);
        
        // Actualizar UI
        document.getElementById(`item-${word}`).classList.add('done');
        const pop = document.getElementById('msg-pop');
        pop.style.opacity = '1';
        sfxCorrect();

        setTimeout(() => {
            pop.style.opacity = '0';
            pieces.forEach(p => p.remove());
            if (zone.querySelectorAll('.piece').length === 0) {
                document.getElementById('hint-text').style.display = 'block';
            }
        }, 1200);

        // Hitos
        if (completadas.length === 5 && !halfwayDone) {
            halfwayDone = true;
            triggerProfessor("¡Sigue, tú puedes!");
        }

        if (completadas.length === PALABRAS_LISTA.length) {
            triggerWin();
        }
    }

    function triggerProfessor(msg) {
        const panel = document.getElementById('prof-panel');
        document.getElementById('prof-txt').textContent = msg;
        sfxMotivate();
        panel.classList.add('show');
        setTimeout(() => panel.classList.remove('show'), 4000);
    }

    function triggerWin() {
        setTimeout(() => {
            sfxWin();
            document.getElementById('final-screen').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            const box = document.getElementById('balloons-box');
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'balloon';
                    b.textContent = ['🎈', '🎊', '✨', '⭐'][Math.floor(Math.random()*4)];
                    b.style.left = Math.random() * 90 + 'vw';
                    box.appendChild(b);
                }, i * 300);
            }
        }, 1500);
    }

    init();
</script>
</body>
</html>
